<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serverless · visitor counter & diagram</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="code-files/style.css">
</head>
<body>

<div class="dashboard fade-in">

  <!-- header -->
  <div class="header">
    <h1><i class="fas fa-cloud-upload-alt"></i> serverless · stats</h1>
    <div class="badge-group">
      <span class="badge"><i class="fas fa-user-friends"></i> total visits <span class="count" id="totalVisitsDisplay">0</span></span>
      <span class="badge"><i class="fas fa-globe"></i> unique IPs <span class="count" id="uniqueIPsDisplay">0</span></span>
      <span class="live-indicator"><i class="fas fa-circle"></i> live</span>
    </div>
  </div>

  <!-- main grid -->
  <div class="grid-2">
    <!-- LEFT: visitor card -->
    <div class="visitor-panel">
      <div class="visitor-icon"><i class="fas fa-chart-line"></i></div>
      <h2>👋 total visitors</h2>
      <div class="big-number" id="visitorCountBig">0</div>
      <div class="sub-info">
        <span class="sub-info-item"><i class="fas fa-arrow-up"></i> <strong id="todayChange">+0</strong> today</span>
        <span class="sub-info-item"><i class="fas fa-clock"></i> last visit <span id="lastVisitTime">—</span></span>
      </div>
      <div class="timestamp">
        <i class="fas fa-database"></i> 
        <span id="sessionNote">session · anonymous count</span>
      </div>
    </div>

    <!-- RIGHT: architecture diagram - VIEW ONLY (admin controls hidden) -->
    <div class="diagram-panel">
      <div class="diagram-header">
        <h3><i class="fas fa-project-diagram"></i> serverless architecture</h3>
        <span class="diagram-badge"><i class="far fa-image"></i> diagram</span>
      </div>
      <div class="diagram-container" id="diagramContainer">
        <!-- Placeholder content (shown when no image is set) -->
        <div class="diagram-placeholder" id="placeholderContent">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>Architecture diagram</p>
          <small>View-only · contact admin for changes</small>
        </div>
        <!-- Image element (hidden by default) -->
        <img id="uploadedDiagram" style="display: none; max-width: 100%; max-height: 100%; object-fit: contain;" alt="Architecture Diagram" />
        
        <!-- Admin controls (hidden by default - double-click to unlock) -->
        <div class="admin-controls" id="adminControls">
          <button class="admin-btn" id="uploadBtn"><i class="fas fa-upload"></i> Upload</button>
          <button class="admin-btn danger" id="removeDiagramBtn"><i class="fas fa-trash-alt"></i> Remove</button>
        </div>
        
        <!-- Secret unlock hint -->
        <span class="secret-unlock" id="secretHint">⚡ double-click to admin</span>
      </div>
      
      <!-- Hidden file input -->
      <input type="file" id="diagramUpload" accept="image/*,.svg" />
      
      <div class="diagram-footer">
        <span><i class="fas fa-arrow-right"></i> Serverless architecture · AWS</span>
        <span class="admin-hint" id="adminStatus">🔒 view-only</span>
      </div>
    </div>
  </div>
</div>

<script src="code-files/script.js"></script>
</body>
</html>
